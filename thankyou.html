<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You | Triplanoro</title>

<link rel="icon" type="image/png" href="trip logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* GIF BACKGROUND */

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;

background:url("travel.gif");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

}

/* DARK OVERLAY */

.overlay{

background:rgba(0,0,0,0.5);
height:100vh;
width:100%;
display:flex;
justify-content:center;
align-items:center;

}

/* CONTENT BOX */

.container{

padding:40px;
border-radius:15px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(5px);

width:500px;

}

h1{

font-size:50px;
font-weight:bold;
margin-bottom:20px;

}

p{

font-size:18px;
line-height:1.6;

}

button{

margin-top:25px;
padding:12px 25px;
font-size:16px;
background:#0077b6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;

}

button:hover{

background:#023e8a;

}

</style>

</head>

<body>

<div class="overlay">

<div class="container">

<h1><b>Thank You</b></h1>

<p>

Thank you for visiting <b>Triplanoro</b>.  
We are always ready to guide you on your journey and help you explore the most beautiful destinations.

Your travel experience matters to us, and we look forward to helping you discover unforgettable places.

</p>

<a href="websites.html">
<button>Back to Tourism</button>
</a>

</div>

</div>

</body>

</html>
