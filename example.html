/* SHOW PLACES */

function showPlaces(state){

const container=document.getElementById("placesContainer");

container.innerHTML="";

if(!data[state]) return;

data[state].forEach(place=>{

container.innerHTML+=`

<div class="card" onclick='openPopup(${JSON.stringify(place)})'>

<img src="${place.img}">

<h3 style="padding:10px">${place.name}</h3>

</div>

`;

});

}

/* OPEN POPUP */

function openPopup(place){

document.getElementById("popup").style.display="block";

document.getElementById("popupTitle").innerText=place.name;

document.getElementById("popupText").innerHTML=place.info;

let imgs="";

place.gallery.forEach(img=>{
imgs+=`<img src="${img}" onclick="openImageViewer('${img}')">`;
});

document.getElementById("popupImages").innerHTML=imgs;

}


/* CLOSE POPUP */

function closePopup(){
document.getElementById("popup").style.display="none";
}
imgs+=`<img src="${img}" onclick="openImageViewer('${img}')">`;
/* DRAGGABLE POPUP */

const popup=document.getElementById("popup");

let isDragging=false;

let offsetX,offsetY;

popup.addEventListener("mousedown",(e)=>{
isDragging=true;
offsetX=e.clientX-popup.offsetLeft;
offsetY=e.clientY-popup.offsetTop;
});

document.addEventListener("mousemove",(e)=>{
if(isDragging){
popup.style.left=(e.clientX-offsetX)+"px";
popup.style.top=(e.clientY-offsetY)+"px";
popup.style.transform="none";
}
});

document.addEventListener("mouseup",()=>{
isDragging=false;
});

const viewer=document.getElementById("imageViewer");

let dragging=false;
let offX,offY;

viewer.addEventListener("mousedown",(e)=>{
dragging=true;
offX=e.clientX-viewer.offsetLeft;
offY=e.clientY-viewer.offsetTop;
});

document.addEventListener("mousemove",(e)=>{
if(dragging){
viewer.style.left=(e.clientX-offX)+"px";
viewer.style.top=(e.clientY-offY)+"px";
viewer.style.transform="none";
}
});

document.addEventListener("mouseup",()=>{
dragging=false;
});
</script>
